<div class="container mt-5">
    <div class="resrva-box shadow p-4 rounded"></div>
    <h2 class="text-center mb-3">Haz tu reserva</h2>
    <p class="text-center text-muted mb-4 ">
        Llena el formulario y haz tu reserva para evitar contratiempos, te esperamos para que disfrutes de la mejor comida colombiana 
    </p>

    <form onsubmit="confirmarReserva(event)">
        
        <div class="mb-3">
            <label class="form-label">Nombre completo:</label>
            <input type="text" class="form-control" id="nombre">
        </div>
        <div class="mb-3">
            <label class="form-label">correo electronico:</label>
            <input type="email" class="form-control" id="correo">
        </div>

        <div class="mb-3">
            <label class="form-label">fecha de tu rsesrva:</label>
            <input type="date" class="form-control" id="fecha">
        </div>  

        <div class="mb-3">
            <label class="form-label">hora de tu reserva:</label>
            <input type="time" class="form-control" id="hora">
        </div>
        <div class="mb-3">
            <label class="form-label">Número de integrantes:</label>
            <select class="form-select" id="integrantes">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6 o mas">6 o mas</option>
            </select>
            
        </div>

<div class="text-center">
    <button type="submit" class="btn btn-success mt-3" >
        Reservar
    </button>
</div>

    </form>
</div>
